
<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a40' : '#eeedfe',
    primaryBorderColor: dark ? '#534AB7' : '#534AB7',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    secondaryColor: dark ? '#0a2a20' : '#e1f5ee',
    secondaryBorderColor: dark ? '#0F6E56' : '#0F6E56',
    tertiaryColor: dark ? '#2a1a0a' : '#faeeda',
    tertiaryBorderColor: dark ? '#854F0B' : '#854F0B',
  },
});

const diagram = `erDiagram

  ROL {
    uuid id PK
    string nombre
    string descripcion
  }

  PERMISO {
    int id PK
    string nombre
    string descripcion
  }

  ROL_PERMISO {
    uuid rol_id FK
    int permiso_id FK
  }

  USUARIO {
    uuid id PK
    uuid rol_id FK
    string nombre
    string email
    string password_hash
    boolean activo
    timestamp created_at
  }

  CLIENTE {
    uuid id PK
    uuid usuario_id FK
    string tipo_cliente
    string nombre_razon_social
    string identificacion_fiscal
    string email
    string telefono
    string direccion
    boolean activo
    timestamp created_at
  }

  CONFIGURACION {
    int id PK
    string clave
    string valor
    string descripcion
    timestamp updated_at
    uuid updated_by_id FK
  }

  CATEGORIA {
    int id PK
    string nombre
    string estrategia_precio
    boolean permite_cubicacion
    decimal min_precio_m3
    decimal max_precio_m3
  }

  TIPO_MADERA {
    uuid id PK
    int categoria_id FK
    string nombre
    decimal densidad_kg_m3
    decimal precio_por_metro
    string descripcion
    boolean activo
    timestamp created_at
  }

  MEDIDA {
    uuid id PK
    uuid tipo_madera_id FK
    decimal ancho_mm
    decimal alto_mm
    string etiqueta
    boolean es_estandar
    boolean cubica
    timestamp created_at
  }

  LOTE_INVENTARIO {
    uuid id PK
    string codigo_lote
    string proveedor
    timestamp fecha_ingreso
    decimal costo_total
    string estado
    timestamp created_at
  }

  PIEZA_MADERA {
    uuid id PK
    uuid tipo_madera_id FK
    uuid medida_id FK
    uuid lote_id FK
    integer largo_mm
    decimal volumen_m3
    integer cantidad
    integer cantidad_reservada
    string estado
    decimal costo_unitario
    decimal precio_unitario
    timestamp fecha_ingreso
    timestamp created_at
    timestamp updated_at
  }

  COTIZACION {
    uuid id PK
    uuid cliente_id FK
    string numero_cotizacion
    string nombre_cliente
    string email_cliente
    string telefono_cliente
    string estado
    string tipo_compra
    decimal total_m3
    decimal subtotal
    decimal costo_transporte
    decimal costo_cargue
    decimal costo_descargue
    decimal costo_salvoconducto
    boolean salvoconducto_es_manual
    decimal porcentaje_anticipo
    decimal valor_anticipo
    decimal total_monto
    timestamp fecha_emision
    timestamp fecha_vencimiento
    timestamp created_at
  }

  DETALLE_COTIZACION {
    uuid id PK
    uuid cotizacion_id FK
    uuid pieza_id FK
    string descripcion_item
    integer cantidad
    decimal volumen_unitario_m3
    decimal precio_unitario_snapshot
    decimal subtotal
  }

  PAGO {
    uuid id PK
    uuid cotizacion_id FK
    decimal monto
    string metodo_pago
    string tipo
    string estado
    string referencia_transaccion
    timestamp created_at
  }

  CARRITO {
    uuid id PK
    uuid usuario_id FK
    timestamp created_at
    timestamp updated_at
  }

  ITEM_CARRITO {
    uuid id PK
    uuid carrito_id FK
    uuid pieza_id FK
    integer cantidad
    timestamp added_at
  }

  MOVIMIENTO_INVENTARIO {
    uuid id PK
    uuid pieza_id FK
    uuid usuario_id FK
    string tipo_movimiento
    integer cantidad
    uuid referencia_id
    timestamp created_at
  }

  REGISTRO_AUDITORIA {
    uuid id PK
    uuid usuario_id FK
    string entidad
    uuid entidad_id
    string accion
    string cambios_json
    timestamp created_at
  }

  HISTORIAL_ESTADO {
    uuid id PK
    uuid usuario_id FK
    string entidad
    uuid entidad_id
    string estado_anterior
    string estado_nuevo
    timestamp created_at
  }

  ROL ||--o{ ROL_PERMISO : "has"
  PERMISO ||--o{ ROL_PERMISO : "granted via"
  ROL ||--o{ USUARIO : "assigned to"
  USUARIO ||--o| CLIENTE : "may be"
  USUARIO ||--o| CARRITO : "has"
  USUARIO ||--o{ MOVIMIENTO_INVENTARIO : "registers"
  USUARIO ||--o{ REGISTRO_AUDITORIA : "generates"
  USUARIO ||--o{ HISTORIAL_ESTADO : "logs"
  USUARIO ||--o{ CONFIGURACION : "last updated by"
  CATEGORIA ||--o{ TIPO_MADERA : "classifies"
  TIPO_MADERA ||--o{ MEDIDA : "has"
  TIPO_MADERA ||--o{ PIEZA_MADERA : "typed as"
  MEDIDA ||--o{ PIEZA_MADERA : "dimensioned by"
  LOTE_INVENTARIO ||--o{ PIEZA_MADERA : "groups"
  PIEZA_MADERA ||--o{ MOVIMIENTO_INVENTARIO : "tracked by"
  PIEZA_MADERA |o--o{ DETALLE_COTIZACION : "referenced in"
  PIEZA_MADERA ||--o{ ITEM_CARRITO : "added to"
  CLIENTE ||--o{ COTIZACION : "requests"
  COTIZACION ||--|{ DETALLE_COTIZACION : "contains"
  COTIZACION ||--o{ PAGO : "paid via"
  CARRITO ||--|{ ITEM_CARRITO : "holds"
`;

try {
  const { svg } = await mermaid.render('erd-svg', diagram);
  document.getElementById('erd').innerHTML = svg;

  document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
    const firstPath = node.querySelector('path[d]');
    if (!firstPath) return;
    const d = firstPath.getAttribute('d');
    const nums = d.match(/-?[\d.]+/g)?.map(Number);
    if (!nums || nums.length < 8) return;
    const xs = [nums[0], nums[2], nums[4], nums[6]];
    const ys = [nums[1], nums[3], nums[5], nums[7]];
    const x = Math.min(...xs), y = Math.min(...ys);
    const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
    const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', y);
    rect.setAttribute('width', w); rect.setAttribute('height', h);
    rect.setAttribute('rx', '8');
    for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
      if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
    }
    firstPath.replaceWith(rect);
  });

  document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
    p.setAttribute('stroke', 'none');
  });
} catch(e) {
  document.getElementById('erd').innerHTML = `<pre style="color:red;font-size:12px;padding:1rem;">${e.message}</pre>`;
}
</script>
